<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#000,#111,#000);
    overflow:hidden;
}

.loader-container{
    text-align:center;
}

.loader-container img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:3px solid lime;
    box-shadow:0 0 25px lime;
    animation:pulse 1.5s infinite;
}

.name{
    color:white;
    font-size:28px;
    margin-top:20px;
    font-weight:bold;
    letter-spacing:2px;
    text-shadow:0 0 10px lime;
}

.loading-text{
    color:lime;
    font-size:22px;
    margin-top:10px;
}

.dots::after{
    content:'';
    animation:dots 1s infinite steps(4);
}

.progress{
    width:250px;
    height:10px;
    background:#222;
    margin:20px auto;
    border-radius:30px;
    overflow:hidden;
}

.progress-bar{
    width:0%;
    height:100%;
    background:lime;
    animation:load 3s linear forwards;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

@keyframes dots{
    0%{content:'';}
    25%{content:'.';}
    50%{content:'..';}
    75%{content:'...';}
    100%{content:'....';}
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}
</style>
</head>
<body>

<div class="loader-container">
    <img src="https://i.pinimg.com/736x/65/41/00/654100d3a9cf91320485029f6840aa02.jpg" alt="Profile">

    <div class="name">MH Hridoy</div>

    <div class="loading-text">
        Loading<span class="dots"></span>
    </div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>
</div>

<script>
setTimeout(()=>{
    window.location.href="main/home.html";
},3000);
</script>

</body>
</html>

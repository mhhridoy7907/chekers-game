<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers Game Full UI with AI Player O</title>
<link rel="icon" href="https://i.pinimg.com/736x/65/41/00/654100d3a9cf91320485029f6840aa02.jpg">

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#2c3e50;
    font-family:Arial;
    color:white;
    padding:80px 20px 20px;
    overflow:hidden;
}

header{
    font-size:30px;
    font-weight:bold;
    position:fixed;
    top:0;
    left:0;
    right:0;
    text-align:left;
    padding:12px;
    background:#2c3e50;
    color:red;
    box-shadow:0 2px 5px rgba(0,0,0,0.3);
    z-index:100;
    display:flex;
    justify-content:left;
    align-items:left;
    gap:10px;
}

header img.logo{
    width:40px;
    height:40px;
    border-radius:50%;
}

.header-right{
    position:absolute;
    top:12px;
    right:20px;
    cursor:pointer;
    font-size:28px;
}

.dropdown{
    position:absolute;
    top:45px;
    right:20px;
    background:#34495e;
    border-radius:10px;
    overflow:hidden;
    display:none;
    flex-direction:column;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
    z-index:200;
}

.dropdown div{
    padding:10px 20px;
    cursor:pointer;
    white-space:nowrap;
    transition:0.2s;
}

.dropdown div:hover{
    background:#5c17eb;
    color:white;
}

.cards{
    display:flex;
    gap:10px;
    margin:15px;
}

.card{
    background:#34495e;
    padding:12px 18px;
    border-radius:12px;
    min-width:150px;
    height:86px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card img{
    width:45px;
    height:45px;
    border-radius:50%;
    margin-bottom:5px;
}

.card h3{
    margin:2px;
    font-size:16px;
}

.card p{
    margin:2px;
    font-size:18px;
    font-weight:bold;
}

#board{
    display:grid;
    grid-template-columns:repeat(8,70px);
    grid-template-rows:repeat(8,70px);
    border:5px solid #333;
    box-shadow:0 0 20px black;
}

.cell{
    width:70px;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.white{ background:#eee; }
.black{ background:#769656; }

.piece{
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.X{ background:#5c17eb; }
.O{ background:black; }

.king{
    border:3px solid gold;
}

.king img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.selected{
    box-shadow:0 0 10px cyan;
}

.highlight{
    box-shadow:inset 0 0 10px cyan;
}

#winner{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background: #fff;
    color:rgb(255, 0, 0);
    padding:30px 50px;
    font-size:48px;
    font-weight:bold;
    box-shadow:0 0 30px rgb(51, 255, 0);
    z-index:999;
    transition:0.5s;
}

#winner.show{
    transform:translate(-50%,-50%) scale(1);
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<div id="winner"></div>

<header>
    <img class="logo" src="https://i.pinimg.com/736x/65/41/00/654100d3a9cf91320485029f6840aa02.jpg" alt="Logo">
    Checkers Game
    <div class="header-right" id="menuBtn">⋮</div>
    <div class="dropdown" id="menuDropdown">
        <div id="restartBtn">Restart 🗘</div>
        <div id="settingsBtn">Settings ⚙️</div>
    </div>
</header>

<div class="cards">
    <div class="card">
        <img src="https://i.pinimg.com/736x/36/f7/02/36f702b674bb8061396b3853ccaf80cf.jpg">
        <h3>Player X (Human)</h3>
    </div>
    <div class="card">
        <h3>Normal</h3>
        <p id="X-normal">12</p>
    </div>
    <div class="card">
        <h3>King</h3>
        <p id="X-king">0</p>
    </div>
</div>

<div id="board"></div>

<div class="cards">
    <div class="card">
        <img src="https://i.pinimg.com/736x/36/f7/02/36f702b674bb8061396b3853ccaf80cf.jpg">
        <h3>Player O (AI)</h3>
    </div>
    <div class="card">
        <h3>Normal</h3>
        <p id="O-normal">12</p>
    </div>
    <div class="card">
        <h3>King</h3>
        <p id="O-king">0</p>
    </div>
</div>

<script src="fu/p2.js"> </script>

</body>
</html>

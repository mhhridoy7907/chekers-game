<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers Hacker AI - Relentless</title>
<link rel="icon" href="https://i.pinimg.com/736x/65/41/00/654100d3a9cf91320485029f6840aa02.jpg">
<style>
body{margin:0;padding:0;font-family:'Courier New',monospace;background:#0f0f0f;color:#0f0;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
header{width:100%;font-size:28px;font-weight:bold;position:fixed;top:0;left:0;background:#111;color:#0f0;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 5px rgba(0,255,0,0.3);z-index:100;}
header img.logo{width:40px;height:40px;border-radius:50%;}
.header-right{cursor:pointer;font-size:28px;}
.dropdown{position:absolute;top:45px;right:20px;background:#111;border-radius:10px;display:none;flex-direction:column;box-shadow:0 0 10px #0f0;z-index:200;}
.dropdown div{padding:10px 20px;cursor:pointer;white-space:nowrap;transition:0.2s;}
.dropdown div:hover{background:#0f0;color:#000;}
.game-wrapper{display:flex;justify-content:center;align-items:flex-start;margin-top:80px;gap:20px;}
.side-cards{display:flex;flex-direction:column;gap:10px;}
.card{background:#111;padding:12px 18px;border-radius:12px;min-width:150px;text-align:center;box-shadow:0 0 10px #0f0;}
.card img{width:50px;height:50px;border-radius:50%;margin-bottom:5px;}
.card h3{margin:5px 0;font-size:16px;color:#0f0;}
.card p{margin:2px 0;font-size:18px;font-weight:bold;}
#board{display:grid;grid-template-columns:repeat(8,70px);grid-template-rows:repeat(8,70px);border:5px solid #0f0;box-shadow:0 0 20px #0f0;}
.cell{width:70px;height:70px;display:flex;justify-content:center;align-items:center;cursor:pointer;transition:all 0.2s;}
.white{background:#111;}
.black{background:#222;}
.piece{width:60px;height:60px;border-radius:50%;display:flex;justify-content:center;align-items:center;transition:all 0.3s ease;}
.X{background:#ff0055;}
.O{background:#00ffff;}
.king{border:3px solid #ff0;}
.king img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.selected{box-shadow:0 0 15px cyan;}
.highlight{box-shadow:inset 0 0 15px cyan;}
#winner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#000;color:#0ff;padding:30px 50px;font-size:48px;font-weight:bold;box-shadow:0 0 30px #0f0;z-index:999;transition:0.5s;}
#winner.show{transform:translate(-50%,-50%) scale(1);}
#hackerBox{position:fixed;bottom:20px;width:400px;height:200px;right:20px;background:#111;border:3px solid #0f0;border-radius:8px;padding:10px;overflow-y:auto;font-size:14px;color:#0f0;box-shadow:0 0 10px #0f0;}
.typingLine{display:block;font-family:'Courier New',monospace;}
</style>
</head>
<body>

<div id="winner"></div>

<header>
    <div style="display:flex;align-items:center;gap:10px;">
        <img class="logo" src="https://i.pinimg.com/736x/65/41/00/654100d3a9cf91320485029f6840aa02.jpg">
        Checkers Hacker AI
    </div>
    <div class="header-right" id="menuBtn">⋮</div>
    <div class="dropdown" id="menuDropdown">
        <div id="restartBtn">Restart 🗘</div>
        <div id="settingsBtn">Settings ⚙️</div>
    </div>
</header>

<div class="game-wrapper">
    <div class="side-cards" id="playerXcards">
        <div class="card">
            <img src="https://i.pinimg.com/736x/36/f7/02/36f702b674bb8061396b3853ccaf80cf.jpg">
            <h3>Player X (Human)</h3>
        </div>
        <div class="card"><h3>Normal</h3><p id="X-normal">12</p></div>
        <div class="card"><h3>King</h3><p id="X-king">0</p></div>
    </div>

    <div id="board"></div>

    <div class="side-cards" id="playerOcards">
        <div class="card">
            <img src="https://i.pinimg.com/736x/64/14/ec/6414ecefcda5b0596a5c7df557a579c3.jpg">
            <h3>Player O (Hacker AI)</h3>
        </div>
        <div class="card"><h3>Normal</h3><p id="O-normal">12</p></div>
        <div class="card"><h3>King</h3><p id="O-king">0</p></div>
    </div>
</div>

<div id="hackerBox"></div>

<script src="fu/p3.js">
</script>
</body>
</html>

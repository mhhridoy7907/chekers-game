<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.settings-box{
    width:360px;
    background:#1b1b1b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,150,0.3);
}

h1{text-align:center;color:#00ff99;}

.setting-item{margin:20px 0;}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile img{
    width:70px;
    height:70px;
    border-radius:50%;
    border:2px solid #00ff99;
    object-fit:cover;
}

.profile input{flex:1;padding:8px;border:none;border-radius:8px;}

.toggle{
    width:60px;height:30px;background:#555;border-radius:20px;position:relative;cursor:pointer;
}

.toggle-circle{
    width:26px;height:26px;background:white;border-radius:50%;position:absolute;top:2px;left:2px;transition:.3s;
}

.toggle.active{background:#00ff99;}
.toggle.active .toggle-circle{left:32px;}

input[type=range]{width:100%;}

button{
    width:100%;padding:12px;margin-top:15px;border:none;border-radius:10px;
    background:#00ff99;font-weight:bold;cursor:pointer;
}
</style>
</head>
<body>

<div class="settings-box">

<h1>⚙ Settings</h1>

<div class="setting-item">
<label>👤 Profile</label>
<div class="profile">
    <img id="profilePic" src="https://i.pravatar.cc/100">
    <input type="text" id="playerName" placeholder="Enter name">
</div>
<input type="file" id="uploadImg" accept="image/*">
</div>

<div class="setting-item">
<label>🎵 Music ON / OFF</label>
<div class="toggle" id="musicToggle">
    <div class="toggle-circle"></div>
</div>
</div>

<div class="setting-item">
<label>🔊 Volume</label>
<input type="range" min="0" max="100" id="volumeSlider">
</div>

<button onclick="goBack()">⬅ Back</button>

</div>

<script>
const uploadImg=document.getElementById("uploadImg");
const profilePic=document.getElementById("profilePic");
const playerName=document.getElementById("playerName");
const musicToggle=document.getElementById("musicToggle");
const volumeSlider=document.getElementById("volumeSlider");

// Load existing settings
if(localStorage.getItem("playerImage")) profilePic.src = localStorage.getItem("playerImage");
if(localStorage.getItem("playerName")) playerName.value = localStorage.getItem("playerName");
if(localStorage.getItem("music")==="on") musicToggle.classList.add("active");
volumeSlider.value = localStorage.getItem("volume") || 50;

// Device image select
uploadImg.addEventListener("change", function(){
    const file=this.files[0];
    if(file){
        const reader=new FileReader();
        reader.onload=function(e){
            profilePic.src=e.target.result;
            localStorage.setItem("playerImage", e.target.result);
        }
        reader.readAsDataURL(file);
    }
});

// Save name
playerName.addEventListener("input",()=>localStorage.setItem("playerName",playerName.value));

// Music toggle
musicToggle.addEventListener("click",()=>{
    musicToggle.classList.toggle("active");
    localStorage.setItem("music", musicToggle.classList.contains("active")?"on":"off");
});

// Volume
volumeSlider.addEventListener("input",()=>localStorage.setItem("volume",volumeSlider.value));

// Back
function goBack(){window.history.back();}
</script>

</body>
</html>

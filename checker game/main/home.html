<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: url('https://i.pinimg.com/1200x/58/e2/35/58e235d40d694f57a432595baa7f6bfe.jpg') no-repeat center center fixed;
    background-size: cover;
    height: 100vh;
    display: flex;
    flex-direction: column;
    animation: fadeInBg 2s ease forwards;
    filter: brightness(1);
    transition: filter 0.5s;
}

@keyframes fadeInBg {
    0% {opacity: 0;}
    100% {opacity: 1;}
}

header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    background: rgba(0,0,0,0.6);
    color: white;
    transform: translateY(-100px);
    animation: slideDown 1s ease forwards;
}

@keyframes slideDown {
    to { transform: translateY(0); }
}

header .logo-name {
    display: flex;
    align-items: center;
    gap: 10px;
}

header .logo-name img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    animation: rotateLogo 2s linear infinite;
}

@keyframes rotateLogo {
    0% { transform: rotate(0deg);}
    50% { transform: rotate(15deg);}
    100% { transform: rotate(0deg);}
}

header .buttons {
    display: flex;
    gap: 15px;
}

header .buttons button {
    padding: 8px 15px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #5c17eb;
    color: white;
    transition: 0.3s;
    transform: scale(1);
}

header .buttons button:hover {
    background: #8233ff;
    transform: scale(1.1);
    box-shadow: 0 0 10px #8233ff;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #000000;
    font-size: 50px;
    text-shadow: 2px 2px 12px black, 0 0 10px #00f600, 0 0 20px #00f600;
    font-family: 'Arial Black', sans-serif;
    gap: 20px;
    top: 80px;
}




@keyframes textSlideUp {
    0% { opacity: 0; transform: translateY(50px); }
    50% { opacity: 1; transform: translateY(-10px); }
    100% { opacity: 1; transform: translateY(0); }
}

@keyframes neonPulse {
    0%, 100% { text-shadow: 0 0 5px #00f600, 0 0 10px #00f600, 0 0 20px #00f600; }
    50% { text-shadow: 0 0 20px #00f600, 0 0 30px #00f600, 0 0 40px #00f600; }
}
.main-content span:nth-child(1) { animation: textSlideUp 1s ease forwards 0.5s, neonPulse 2s infinite; }
.main-content span:nth-child(2) { animation: textSlideUp 1s ease forwards 1.5s, neonPulse 2s infinite; }
.main-content span:nth-child(3) { animation: textSlideUp 1s ease forwards 2.5s, neonPulse 2s infinite; }


.play-buttons {
    display: flex;
    gap: 30px;
    margin-top: 30px;
}

.play-buttons button {
    padding: 15px 30px;
    font-size: 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #ff007f;
    color: white;
    transition: 0.3s;
    text-shadow: 0 0 5px black;
}

.play-buttons button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
}
</style>
</head>
<body>

<header>

    <div class="logo-name">
       <img id="playerProfile" src="https://i.pinimg.com/736x/36/f7/02/36f702b674bb8061396b3853ccaf80cf.jpg">
            <h3 id="playerNameShow">Player X</h3>
    </div>
    <div class="buttons">
        <button onclick="location.href='set.html'">Settings ⚙️</button>
        <button onclick="toggleMode()">Mode 🌙</button>
    </div>
</header>

<div class="main-content">
    <span>Welcome to Checkers Game</span>
    

    <div class="play-buttons">
        <button onclick="location.href='FD/play2.html'">Play with AI</button>
        <button onclick="location.href='FD/play3.html'">Play with Hacker Ai</button>
        <button onclick="location.href='FD/play1.html'">2 Player</button>
    </div>
</div>

        <script sr="funtion/hm.js"></script>

</body>
</html>
